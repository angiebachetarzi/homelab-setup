################################################################
# AdGuard Home
# URL: http://adguard.home
#
# IMPORTANT — before starting this container, disable systemd-resolved
# on the host or port 53 will already be in use and the container will fail:
#
#   sudo systemctl stop systemd-resolved
#   sudo systemctl disable systemd-resolved
#
# First-time setup:
#   1. Start the container: docker compose up -d
#   2. Visit http://192.168.129.12:3000 to run the setup wizard
#   3. Once setup is done, port 3000 is no longer needed
#      You can comment it out below and restart: docker compose up -d
################################################################

services:
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    restart: unless-stopped
    env_file: .env
    ports:
      - "53:53/tcp"       # DNS over TCP
      - "53:53/udp"       # DNS over UDP — must be bound on host directly
      - "3000:3000/tcp"   # First-run setup wizard — comment out after initial setup
    volumes:
      - ${CONFIG_PATH}/work:/opt/adguardhome/work
      - ${CONFIG_PATH}/conf:/opt/adguardhome/conf
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      # Router
      - "traefik.http.routers.adguard.rule=Host(`adguard.home`)"
      - "traefik.http.routers.adguard.entrypoints=web"
      # AdGuard web UI runs on port 80 inside the container after setup
      - "traefik.http.services.adguard.loadbalancer.server.port=80"

networks:
  proxy:
    external: true