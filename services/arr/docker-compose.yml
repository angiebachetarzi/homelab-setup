################################################################
# Arr stack
#
# Services: qBittorrent, Prowlarr, Radarr, Sonarr, Lidarr, Bazarr, Overseerr
#
# Expected media layout on the host:
#   /data/media/movies
#   /data/media/tv
#   /data/media/music
#   /data/downloads/complete
#   /data/downloads/incomplete
#
# Create these before starting:
#   mkdir -p /data/media/{movies,tv,music}
#   mkdir -p /data/downloads/{complete,incomplete}
#
# First-time setup order:
#   1. qBittorrent — get generated password from logs:
#        docker logs qbittorrent | grep -i password
#      Then change it in the UI under Settings → Web UI
#   2. Prowlarr — add your indexers, then connect to Radarr/Sonarr/Lidarr
#   3. Radarr / Sonarr / Lidarr — add qBittorrent as download client, add root folders
#   4. Bazarr — configure via Radarr/Sonarr integration in its settings
#   5. Overseerr — connect to Plex + Radarr/Sonarr during setup wizard
################################################################

services:

  ###############################################################
  # qBittorrent — download client
  # URL: http://qbit.home
  # First run: check logs for generated password:
  #   docker logs qbittorrent | grep -i password
  ###############################################################
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ${CONFIG_PATH}/qbittorrent:/config
      - ${DOWNLOAD_PATH}:/downloads
    restart: unless-stopped
  ###############################################################
  # Prowlarr — indexer manager
  # URL: http://prowlarr.home
  ###############################################################
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/prowlarr:/config
    restart: unless-stopped
  ###############################################################
  # Radarr — movies automation
  # URL: http://radarr.home
  ###############################################################
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    env_file: .env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/radarr:/config
      - ${MEDIA_PATH}/movies:/movies
      - ${DOWNLOAD_PATH}:/downloads
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.home`)"
      - "traefik.http.routers.radarr.entrypoints=web"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"

  ###############################################################
  # Sonarr — TV shows automation
  # URL: http://sonarr.home
  ###############################################################
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    env_file: .env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/sonarr:/config
      - ${MEDIA_PATH}/tv:/tv
      - ${DOWNLOAD_PATH}:/downloads
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.home`)"
      - "traefik.http.routers.sonarr.entrypoints=web"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"

  ###############################################################
  # Lidarr — music automation
  # URL: http://lidarr.home
  ###############################################################
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    env_file: .env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/lidarr:/config
      - ${MEDIA_PATH}/music:/music
      - ${DOWNLOAD_PATH}:/downloads
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lidarr.rule=Host(`lidarr.home`)"
      - "traefik.http.routers.lidarr.entrypoints=web"
      - "traefik.http.services.lidarr.loadbalancer.server.port=8686"

  ###############################################################
  # Bazarr — subtitles automation
  # URL: http://bazarr.home
  ###############################################################
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    env_file: .env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/bazarr:/config
      - ${MEDIA_PATH}/movies:/movies
      - ${MEDIA_PATH}/tv:/tv
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bazarr.rule=Host(`bazarr.home`)"
      - "traefik.http.routers.bazarr.entrypoints=web"
      - "traefik.http.services.bazarr.loadbalancer.server.port=6767"

  ###############################################################
  # Jellyseerr — media request UI
  # URL: http://jellyseer.home
  ###############################################################
  jellyseerr:
    image: fallenbagel/jellyseerr:latest # The Jellyfin-optimized fork
    container_name: jellyseerr
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=${TZ}
      - LOG_LEVEL=debug
    volumes:
      - ${CONFIG_PATH}/jellyseerr:/app/config
    ports:
      - "5055:5055"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyseerr.rule=Host(`requests.home`)" # You can use jellyseerr.home if you prefer
      - "traefik.http.routers.jellyseerr.entrypoints=web"
      - "traefik.http.services.jellyseerr.loadbalancer.server.port=5055"

  ###############################################################
  # Flaresolverr — anti-captcha proxy for indexers that use Cloudflare
  # URL: http://flaresolverr.home
  ###############################################################
  flaresolverr:
   image: ghcr.io/flaresolverr/flaresolverr:latest
   container_name: flaresolverr
   network_mode: "service:gluetun"
   depends_on:
     - gluetun
   environment:
     - LOG_LEVEL=info
     - TZ=${TZ}
   restart: unless-stopped

  ###############################################################
  # Gluetun — VPN client for secure torrenting
  # URL: http://gluetun.home:8080 (qBittorrent Web
  # First run: set your VPN credentials in the .env file
  ###############################################################
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=mOjRmz0iAStEwlb/J7faCP5ZexnEwNjYnG56G1hF/Hc=
      - SERVER_COUNTRIES=Canada  # Or whatever country you chose
      - TZ=${TZ}
      - DNS_ADDRESS=1.1.1.1
      - DOT=off
    ports:
      - "8080:8080" # qBittorrent Web UI
      - "9117:9117" # Jackett (if used)
      - "9696:9696" # Prowlarr
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      # qBittorrent Routing
      - "traefik.http.routers.qbittorrent.rule=Host(`qbit.home`)"
      - "traefik.http.routers.qbittorrent.entrypoints=web"
      - "traefik.http.routers.qbittorrent.service=qbittorrent-svc"
      - "traefik.http.services.qbittorrent-svc.loadbalancer.server.port=8080"
      # Prowlarr Routing (PUT THE NEW LABELS HERE)
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.home`)"
      - "traefik.http.routers.prowlarr.entrypoints=web"
      - "traefik.http.routers.prowlarr.service=prowlarr-svc"
      - "traefik.http.services.prowlarr-svc.loadbalancer.server.port=9696"
    restart: unless-stopped

networks:
  proxy:
    external: true
