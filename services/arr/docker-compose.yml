################################################################
# Arr stack (Cleaned — No VPN / Direct Volumes)
#
# Services: qBittorrent, Prowlarr, Radarr, Sonarr, Lidarr, Bazarr, Overseerr
################################################################

services:

  ###############################################################
  # qBittorrent — download client
  # URL: http://qbit.home
  ###############################################################
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Brussels
      - WEBUI_PORT=8080
    volumes:
      - /opt/homelab-setup/services/arr/config/qbittorrent:/config
      - /mnt:/data
    networks:
      - proxy
      - default
    ports:
      - "6881:6881"
      - "6881:6881/udp"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qbittorrent.rule=Host(`qbit.home`)"
      - "traefik.http.routers.qbittorrent.entrypoints=web"
      - "traefik.http.routers.qbittorrent.service=qbittorrent-svc"
      - "traefik.http.services.qbittorrent-svc.loadbalancer.server.port=8080"
    restart: unless-stopped

  ###############################################################
  # Prowlarr — indexer manager
  # URL: http://prowlarr.home
  ###############################################################
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - /opt/homelab-setup/services/arr/config/prowlarr:/config
    ports:
      - "9696:9696"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.home`)"
      - "traefik.http.routers.prowlarr.entrypoints=web"
      - "traefik.http.routers.prowlarr.service=prowlarr-svc"
      - "traefik.http.services.prowlarr-svc.loadbalancer.server.port=9696"
    restart: unless-stopped

  ###############################################################
  # Radarr — movie management
  # URL: http://radarr.home
  ###############################################################
